<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Avance - Serie de Taylor</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>Cálculo del Seno con Serie de Taylor</h1>

<div class="card">

<label>Ángulo (radianes):</label>
<input id="angulo" type="number" step="0.1" value="0.5">

<label>Términos (n):</label>
<input id="n" type="number" value="10">

<button id="btnCalcular">Calcular</button>

</div>

<div class="card">
<h2>Resultado</h2>
<p id="resultado"></p>
<p id="real"></p>
<p id="error"></p>
</div>

<script src="dist/app.js"></script>

</body>
</html>
